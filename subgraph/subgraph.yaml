specVersion: 0.0.7
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: GameItems
    network: arbitrum-sepolia
    source:
      address: "0x2279B7A0a67DB372996a5FaB50D91eAA73d2eBe6"
      abi: GameItems
      startBlock: START_BLOCK
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - Item
        - ItemBalance
        - Craft
      abis:
        - name: GameItems
          file: ./abis/GameItems.json
      eventHandlers:
        - event: ItemsMinted(indexed address,uint256,uint256)
          handler: handleItemsMinted
        - event: SwordCrafted(indexed address,uint256)
          handler: handleSwordCrafted
      file: ./src/mapping.ts

  - kind: ethereum
    name: GameEngine
    network: arbitrum-sepolia
    source:
      address: "0x610178dA211FEF7D417bC0e6FeD39F05609AD788"
      abi: GameEngine
      startBlock: START_BLOCK
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - LootFarm
        - ProtocolConfigChange
      abis:
        - name: GameEngine
          file: ./abis/GameEngine.json
      eventHandlers:
        - event: LootFarmed(indexed address,uint256,uint256)
          handler: handleLootFarmed
        - event: DropChanceUpdated(uint256,uint256)
          handler: handleDropChanceUpdated
        - event: MaxLoopsUpdated(uint256,uint256)
          handler: handleMaxLoopsUpdated
      file: ./src/mapping.ts

  - kind: ethereum
    name: AMM
    network: arbitrum-sepolia
    source:
      address: "0x0DCd1Bf9A1b36cE34237eEaFef220932846BCD82"
      abi: AMM
      startBlock: START_BLOCK
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - Swap
        - LiquidityEvent
      abis:
        - name: AMM
          file: ./abis/AMM.json
      eventHandlers:
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Swap(indexed address,indexed address,uint256,uint256)
          handler: handleSwap
      file: ./src/mapping.ts

  - kind: ethereum
    name: AMMFactory
    network: arbitrum-sepolia
    source:
      address: "0x9A9f2CCfdE556A7E9Ff0848998Aa4a0CFD8863AE"
      abi: AMMFactory
      startBlock: START_BLOCK
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PoolCreation
      abis:
        - name: AMMFactory
          file: ./abis/AMMFactory.json
      eventHandlers:
        - event: PoolCreated(indexed address,indexed address,address,uint256)
          handler: handlePoolCreated
      file: ./src/mapping.ts

  - kind: ethereum
    name: IronShop
    network: arbitrum-sepolia
    source:
      address: "0x3Aa5ebB10DC797CAC828524e59A333d0A371443c"
      abi: IronShop
      startBlock: START_BLOCK
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Player
        - IronPurchase
        - ProtocolConfigChange
      abis:
        - name: IronShop
          file: ./abis/IronShop.json
      eventHandlers:
        - event: IronPurchased(indexed address,uint256,uint256)
          handler: handleIronPurchased
        - event: PriceFeedUpdated(indexed address)
          handler: handlePriceFeedUpdated
        - event: IronPriceUpdated(uint256)
          handler: handleIronPriceUpdated
      file: ./src/mapping.ts

  - kind: ethereum
    name: IronVault
    network: arbitrum-sepolia
    source:
      address: "0xA51c1fc2f0D1a1b8494Ed1FE312d7C3a78Ed91C0"
      abi: IronVault
      startBlock: START_BLOCK
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultYield
      abis:
        - name: IronVault
          file: ./abis/IronVault.json
      eventHandlers:
        - event: YieldAdded(uint256)
          handler: handleYieldAdded
      file: ./src/mapping.ts

  - kind: ethereum
    name: MyGovernor
    network: arbitrum-sepolia
    source:
      address: "0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9"
      abi: MyGovernor
      startBlock: START_BLOCK
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - VoteCastEvent
        - Player
      abis:
        - name: MyGovernor
          file: ./abis/MyGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
      file: ./src/mapping.ts
